version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stockdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app1:
    build: .
    environment:
      DB_URL: jdbc:postgresql://db:5432/stockdb
    depends_on:
      db:
        condition: service_healthy
    restart: always

  app2:
    build: .
    environment:
      DB_URL: jdbc:postgresql://db:5432/stockdb
    depends_on:
      db:
        condition: service_healthy
    restart: always

  load_balancer:
    image: nginx:alpine
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2